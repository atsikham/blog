---
name: test

on:
  push:
  pull_request:
  workflow_call:  # allows deploy.yml to call this as a dependency

jobs:
  unit-tests:
    name: frontend unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install dependencies
        run: npm install

      - name: regenerate prerendered SEO pages + sitemap
        run: npm run gen:seo

      - name: run parser + helper tests
        run: npm test

      - name: run SEO smoke tests
        run: npm run test:smoke:seo

  smoke-tests:
    name: browser smoke test
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install dependencies
        run: npm install

      - name: generate prerendered SEO pages + sitemap
        run: npm run gen:seo

      - name: install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: run smoke test
        run: npm run test:smoke

  lambda-tests:
    name: python lambda tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install lambda test dependencies
        working-directory: lambda
        run: python -m pip install -r requirements-dev.txt

      - name: run lambda tests
        working-directory: lambda
        run: python -m pytest -q
