    <text x="100" y="340" text-anchor="middle" font-size="17" font-weight="700">API Gateway</text>
    <text x="100" y="362" text-anchor="middle" class="lbl">HTTP API</text>

    <path d="M181,347 L259,347" class="arrow" marker-end="url(#arr)"/>
    <path d="M181,349 L258,348" class="arrow" marker-end="url(#arr)" opacity="0.35"/>

    <rect x="263" y="312" width="160" height="70" rx="10" fill="#d9f2ef" stroke="#111827" stroke-width="2.2"
          class="sketch"/>
    <rect x="265" y="314" width="156" height="66" rx="9" fill="none" stroke="#111827" stroke-width="1.2" class="sketch"
          opacity="0.45"/>
    <text x="343" y="340" text-anchor="middle" font-size="17" font-weight="700">Lambda</text>
    <text x="343" y="362" text-anchor="middle" class="lbl">Python backend</text>

    <path d="M343,383 L343,408" stroke="#111827" stroke-width="1.7" fill="none" stroke-dasharray="5,4" class="sketch"/>

    <rect x="20" y="410" width="408" height="210" rx="10" fill="#fffefb" stroke="#111827" stroke-width="2"
          class="sketch"/>
    <rect x="22" y="412" width="404" height="206" rx="9" fill="none" stroke="#111827" stroke-width="1.1" class="sketch"
          opacity="0.35"/>
    <text x="42" y="440" font-size="14" fill="#0f766e" font-weight="600">GET /stats</text>
    <text x="210" y="440" class="dim">bulk likes + reads</text>
    <text x="42" y="466" font-size="14" fill="#0f766e" font-weight="600">POST /like</text>
    <text x="210" y="466" class="dim">toggle like</text>
    <text x="42" y="492" font-size="14" fill="#0f766e" font-weight="600">POST /read</text>
    <text x="210" y="492" class="dim">record a view</text>
    <text x="42" y="518" font-size="14" fill="#0f766e" font-weight="600">GET /comments</text>
    <text x="210" y="518" class="dim">list comments</text>
    <text x="42" y="544" font-size="14" fill="#0f766e" font-weight="600">POST /comments</text>
    <text x="210" y="544" class="dim">add comment / reply</text>
    <text x="42" y="592" font-size="13" fill="#4b5563">one Lambda handles all blog API routes</text>

    <path d="M429,500 C530,484 600,472 644,470" class="arrow" marker-end="url(#arr)"/>
    <path d="M429,502 C531,487 601,474 644,472" class="arrow" marker-end="url(#arr)" opacity="0.35"/>

    <rect x="648" y="412" width="280" height="114" rx="10" fill="#dff3e4" stroke="#111827" stroke-width="2.2"
          class="sketch"/>
    <rect x="650" y="414" width="276" height="110" rx="9" fill="none" stroke="#111827" stroke-width="1.2" class="sketch"
          opacity="0.45"/>
    <text x="788" y="452" text-anchor="middle" font-size="17" font-weight="700">DynamoDB</text>
    <text x="788" y="476" text-anchor="middle" class="lbl">post stats</text>
    <text x="788" y="500" text-anchor="middle" class="lbl">comment threads</text>
</svg>

