    <rect x="508" y="46" width="156" height="66" rx="9" fill="none" stroke="#111827" stroke-width="1.2" class="sketch"
          opacity="0.45"/>
    <text x="586" y="72" text-anchor="middle" font-size="17" font-weight="700">S3 Bucket</text>
    <text x="586" y="94" text-anchor="middle" class="lbl">static site files</text>

    <path d="M586,115 L586,140" stroke="#111827" stroke-width="1.7" fill="none" stroke-dasharray="5,4" class="sketch"/>
    <rect x="506" y="142" width="230" height="168" rx="10" fill="#fffefb" stroke="#111827" stroke-width="2"
