<svg viewBox="0 0 980 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @font-face {
            font-family: 'Virgil';
            src: url('https://excalidraw.com/Virgil.woff2') format('woff2');
            font-display: swap;
            }
            text { font-family: 'Virgil', 'Segoe Print', 'Comic Sans MS', cursive; fill: #1e1e2e; }
            .lbl { font-size: 14px; fill: #1e1e2e; }
            .dim { font-size: 13px; fill: #4b5563; }
            .sketch { stroke-linecap: round; stroke-linejoin: round; }
            .arrow { stroke: #111827; stroke-width: 2.2; fill: none; stroke-linecap: round; }
        </style>
        <marker id="arr" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto">
            <path d="M2,2 L12,8 L2,14" fill="none" stroke="#111827" stroke-width="2.2" stroke-linecap="round"
                  stroke-linejoin="round"/>
            <path d="M3,3 L11,8 L3,13" fill="none" stroke="#111827" stroke-width="1.4" stroke-linecap="round"
                  stroke-linejoin="round" opacity="0.75"/>
        </marker>
    </defs>
    <rect width="980" height="640" fill="#fffdf8"/>

    <rect x="20" y="44" width="160" height="70" rx="10" fill="#dceafe" stroke="#111827" stroke-width="2.2"
          class="sketch"/>
    <rect x="22" y="46" width="156" height="66" rx="9" fill="none" stroke="#111827" stroke-width="1.2" class="sketch"
          opacity="0.45"/>
    <text x="100" y="72" text-anchor="middle" font-size="17" font-weight="700">Browser</text>
    <text x="100" y="94" text-anchor="middle" class="lbl">tikho.me</text>

    <text x="220" y="63" text-anchor="middle" class="dim">page request</text>
    <path d="M181,79 L259,79" class="arrow" marker-end="url(#arr)"/>
    <path d="M181,81 L258,80" class="arrow" marker-end="url(#arr)" opacity="0.35"/>

    <rect x="263" y="44" width="160" height="70" rx="10" fill="#dff3e4" stroke="#111827" stroke-width="2.2"
          class="sketch"/>
    <rect x="265" y="46" width="156" height="66" rx="9" fill="none" stroke="#111827" stroke-width="1.2" class="sketch"
          opacity="0.45"/>
    <text x="343" y="72" text-anchor="middle" font-size="17" font-weight="700">CloudFront</text>
    <text x="343" y="94" text-anchor="middle" class="lbl">CDN + HTTPS</text>

    <text x="463" y="63" text-anchor="middle" class="dim">static origin</text>
    <path d="M424,79 L502,79" class="arrow" marker-end="url(#arr)"/>
    <path d="M424,81 L501,80" class="arrow" marker-end="url(#arr)" opacity="0.35"/>

    <rect x="506" y="44" width="160" height="70" rx="10" fill="#fdecc8" stroke="#111827" stroke-width="2.2"
