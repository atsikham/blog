    <text x="526" y="168" class="lbl">index.html</text>
    <text x="526" y="191" class="lbl">src/js/app.js</text>
    <text x="526" y="214" class="lbl">src/css/style.css</text>
    <text x="526" y="237" class="lbl">posts (*.adoc / *.md)</text>
    <text x="526" y="260" class="dim">diagram assets</text>
    <text x="526" y="282" class="dim">manifest.json</text>

    <path d="M100,115 L100,308" class="arrow" stroke-dasharray="6,4" marker-end="url(#arr)"/>
    <path d="M102,116 L101,307" class="arrow" stroke-dasharray="6,4" marker-end="url(#arr)" opacity="0.35"/>
    <text x="114" y="218" font-size="14" fill="#4b5563">likes / reads / comments</text>

    <rect x="20" y="312" width="160" height="70" rx="10" fill="#ece7fb" stroke="#111827" stroke-width="2.2"
          class="sketch"/>
    <rect x="22" y="314" width="156" height="66" rx="9" fill="none" stroke="#111827" stroke-width="1.2" class="sketch"
